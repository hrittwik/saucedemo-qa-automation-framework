name: QA Automation Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Selenium Tests
    runs-on: ubuntu-latest

    env:
      BASE_URL: https://www.saucedemo.com
      BROWSER: chrome
      HEADLESS: "true"
      SCREENSHOT_ON_FAILURE: "true"
      IMPLICIT_WAIT: "10"
      EXPLICIT_WAIT: "20"
      PAGE_LOAD_TIMEOUT: "30"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Chrome + ChromeDriver
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
        id: setup-chrome

      - name: Verify Chrome and ChromeDriver
        run: |
          echo "Chrome: $(google-chrome --version)"
          echo "ChromeDriver: $(chromedriver --version)"
          echo "ChromeDriver path: $(which chromedriver)"

      - name: Create required directories
        run: |
          mkdir -p reports screenshots allure-results

      - name: Run test suite
        env:
          CHROMEDRIVER_PATH: ${{ steps.setup-chrome.outputs.chromedriver-path }}
        run: pytest

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-html-report
          path: reports/report.html
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: screenshots/
          if-no-files-found: ignore
          retention-days: 7
